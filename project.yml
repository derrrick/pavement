name: Pavement
options:
  bundleIdPrefix: app.pavement
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    ENABLE_HARDENED_RUNTIME: NO

packages:
  PavementPackage:
    path: "."

targets:
  Pavement:
    type: application
    platform: macOS
    sources:
      - path: Pavement
    info:
      path: Pavement/Info.plist
      properties:
        CFBundleName: $(PRODUCT_NAME)
        CFBundleDisplayName: Pavement
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleShortVersionString: "0.0.1"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: "14.0"
        NSHighResolutionCapable: true
        NSHumanReadableCopyright: ""
        NSMainStoryboardFile: ""
        NSPrincipalClass: NSApplication
        NSSupportsAutomaticTermination: true
        NSSupportsSuddenTermination: true
        CFBundleDocumentTypes:
          - CFBundleTypeName: Fujifilm RAW
            CFBundleTypeRole: Editor
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - com.fuji.raw-image
          - CFBundleTypeName: Canon RAW (CR3)
            CFBundleTypeRole: Editor
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - com.canon.cr3-raw-image
          - CFBundleTypeName: Adobe DNG
            CFBundleTypeRole: Editor
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - com.adobe.raw-image
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.pavement.Pavement
        PRODUCT_NAME: Pavement
        CODE_SIGN_ENTITLEMENTS: Pavement/Pavement.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
        ENABLE_PREVIEWS: YES
        SWIFT_EMIT_LOC_STRINGS: YES
    dependencies:
      - package: PavementPackage
        product: PavementCore
      - package: PavementPackage
        product: PavementUI
